<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DzDiniro | لوحة التحكم</title>
  <meta name="description" content="DzDiniro - لوحة تحكم إدارة طلبات الشحن">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-effects">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <div class="brand-icon">💸</div>
      <span class="brand-text">DZDINIRO</span>
    </a>
  </nav>
  <div class="nav-links">
    <a href="index.html">🏠 الرئيسية</a>
  </div>

  <main class="container" style="padding-top: 6rem;">

    <!-- Admin Header -->
    <div class="admin-header fade-in">
      <div>
        <h1>🛡️ لوحة التحكم</h1>
        <p style="color: var(--text-muted); margin-top: 0.3rem;">إدارة طلبات الشحن</p>
      </div>
      <button class="action-btn delete" id="btnClearAll" style="padding: 0.6rem 1.2rem; font-size: 0.9rem;">
        🗑️ حذف الكل
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-grid fade-in stagger-1" id="statsGrid">
      <div class="stat-card">
        <span class="stat-icon">📦</span>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">إجمالي الطلبات</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">⏳</span>
        <div class="stat-value" id="statPending" style="color: var(--accent-gold);">0</div>
        <div class="stat-label">قيد الانتظار</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div class="stat-value" id="statCompleted" style="color: var(--accent-green);">0</div>
        <div class="stat-label">مكتملة</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">❌</span>
        <div class="stat-value" id="statCancelled" style="color: var(--accent-red);">0</div>
        <div class="stat-label">ملغاة</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="admin-filters fade-in stagger-2" id="filters">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="pending">⏳ قيد الانتظار</button>
      <button class="filter-btn" data-filter="completed">✅ مكتملة</button>
      <button class="filter-btn" data-filter="cancelled">❌ ملغاة</button>
    </div>

    <!-- Orders Table -->
    <div class="orders-table-wrapper fade-in stagger-3">
      <table class="orders-table" id="ordersTable">
        <thead>
          <tr>
            <th>رقم الطلب</th>
            <th>سيرفس/الخدمة</th>
            <th>المعرّف/الحساب</th>
            <th>الباقة/المبلغ</th>
            <th>إجمالي الدفع</th>
            <th>إثبات الدفع</th>
            <th>الحالة</th>
            <th>التاريخ</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
        </tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display: none;">
        <span class="empty-icon">📭</span>
        <p>لا توجد طلبات حتى الآن</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 DzDiniro — لوحة تحكم الإدارة</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
